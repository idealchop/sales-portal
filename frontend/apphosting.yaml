# Firebase App Hosting — Sales Portal (Next.js)
# See: https://firebase.google.com/docs/app-hosting/configure

kind: "AppStack"
apiVersion: "v1"

runConfig:
  minInstances: 0
  memoryMiB: 1024
  cpu: 1

scripts:
  buildCommand: npm run build
  runCommand: node .next/standalone/frontend/server.js

