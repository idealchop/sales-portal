# Firebase App Hosting — monorepo root fallback
#
# Preferred: set App Hosting backend root directory to `frontend` in Firebase Console
# (or use root firebase.json apphosting.rootDir). Then frontend/apphosting.yaml applies.
#
# This file is used when the backend builds from the repository root.

kind: "AppStack"
apiVersion: "v1"

runConfig:
  minInstances: 0
  memoryMiB: 1024
  cpu: 1

scripts:
  buildCommand: npm ci && npm run build
  runCommand: npm run start -- -p $PORT -H 0.0.0.0

env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: "AIzaSyCbbvsSnCnK7L65WY7sZ5VKcaxu1HB_0aU"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "aquaflow-management-suite.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "aquaflow-management-suite"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "smartrefill-singapore"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "185761068269"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:185761068269:web:eb3498fcd1d5974897c8e4"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
    value: "G-F49CW4NQ5K"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIRESTORE_DB
    value: "riverdb"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_DEV
    value: "false"
    availability:
